---
- name: Create Pi-hole directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: homelab
    group: homelab
    mode: '0755'
  loop:
    - /opt/pihole
    - /opt/pihole/etc-pihole
    - /opt/pihole/etc-dnsmasq.d

- name: Open firewall ports for Pi-hole
  ansible.posix.firewalld:
    port: "{{ item }}"
    permanent: true
    state: enabled
    immediate: true
  loop:
    - 53/tcp
    - 53/udp
    - 80/tcp
  become: true

- name: Open firewall ports for Pi-hole
  ansible.posix.firewalld:
    port: "{{ item }}"
    permanent: true
    state: enabled
    immediate: true
  loop:
    - 53/tcp
    - 53/udp
    - 80/tcp
  become: true

- name: Deploy Pi-hole custom DNS list
  ansible.builtin.template:
    src: custom.list.j2
    dest: /opt/pihole/etc-pihole/custom.list
    owner: homelab
    group: homelab
    mode: '0644'
  notify: Restart pihole

- name: Deploy Pi-hole Docker Compose
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: /opt/pihole/docker-compose.yml
    owner: homelab
    group: homelab
    mode: '0644'
  notify: Restart pihole

- name: Ensure Pi-hole compose is running
  ansible.builtin.command: docker compose up -d
  args:
    chdir: /opt/pihole
  changed_when: true

---
- name: Restart uptime-kuma
  ansible.builtin.command: docker compose restart
  args:
    chdir: /opt/uptime-kuma
  changed_when: true

- name: Restart portainer
  ansible.builtin.command: docker compose restart
  args:
    chdir: /opt/portainer
  changed_when: true

- name: Restart homepage
  ansible.builtin.command: docker compose restart
  args:
    chdir: /opt/homepage
  changed_when: true

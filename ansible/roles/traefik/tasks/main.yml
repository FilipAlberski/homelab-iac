---
- name: Create Traefik directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: homelab
    group: homelab
    mode: '0755'
  loop:
    - /opt/traefik
    - /opt/traefik/config

- name: Open firewall ports for Traefik
  ansible.posix.firewalld:
    port: "{{ item }}"
    permanent: true
    state: enabled
    immediate: true
  loop:
    - 80/tcp
    - 8080/tcp
  become: true

- name: Open firewall ports for Traefik
  ansible.posix.firewalld:
    port: "{{ item }}"
    permanent: true
    state: enabled
    immediate: true
  loop:
    - 80/tcp
    - 8080/tcp
  become: true

- name: Deploy Traefik static config
  ansible.builtin.template:
    src: traefik.yml.j2
    dest: /opt/traefik/traefik.yml
    owner: homelab
    group: homelab
    mode: '0644'
  notify: Restart traefik

- name: Deploy Traefik dynamic config
  ansible.builtin.template:
    src: dynamic.yml.j2
    dest: /opt/traefik/config/dynamic.yml
    owner: homelab
    group: homelab
    mode: '0644'
  notify: Restart traefik

- name: Deploy Traefik dynamic config
  ansible.builtin.template:
    src: dynamic.yml.j2
    dest: /opt/traefik/config/dynamic.yml
    owner: homelab
    group: homelab
    mode: '0644'
  notify: Restart traefik

- name: Deploy Traefik Docker Compose
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: /opt/traefik/docker-compose.yml
    owner: homelab
    group: homelab
    mode: '0644'
  notify: Restart traefik

- name: Ensure Traefik compose is running
  ansible.builtin.command: docker compose up -d
  args:
    chdir: /opt/traefik
  changed_when: true
